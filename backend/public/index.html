<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 江苏君劭律师事务所</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1B3A5C;
      --secondary: #C9A84C;
      --bg: #f4f6f9;
      --white: #fff;
      --text: #333;
      --text-light: #666;
      --border: #e0e4ea;
      --danger: #e53;
      --success: #2a9d4a;
    }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    /* Top Nav */
    .topnav {
      background: var(--primary);
      color: var(--white);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .topnav .brand { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .topnav .brand span { color: var(--secondary); }
    .topnav-right { display: flex; align-items: center; gap: 16px; }
    .topnav-right .username { font-size: 13px; opacity: 0.85; }
    .topnav-right button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.2s;
    }
    .topnav-right button:hover { background: rgba(255,255,255,0.25); }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 56px; left: 0; bottom: 0;
      width: 220px;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
    }
    .sidebar h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      padding: 0 20px 10px;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar a:hover { background: var(--bg); color: var(--primary); }
    .sidebar a.active {
      background: #eef3f8;
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 500;
    }
    .sidebar a .icon { font-size: 16px; width: 20px; text-align: center; }

    /* Main */
    .main {
      margin-left: 220px;
      margin-top: 56px;
      padding: 28px 32px;
      min-height: calc(100vh - 56px);
    }
    .page-title {
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 24px;
      font-weight: 700;
    }
    .page-title span { font-size: 14px; color: var(--text-light); font-weight: 400; margin-left: 12px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 10px;
      padding: 24px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card .number { font-size: 36px; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 13px; color: var(--text-light); margin-top: 4px; }

    /* Actions */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 16px; color: var(--text); }
    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #153049; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* Tables */
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { background: var(--bg); font-weight: 500; color: var(--text-light); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover { background: #fafbfc; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #eef3f8;
      color: var(--primary);
      margin: 2px;
    }
    .tag-partner { background: #fff8e6; color: #8a6000; }
    .actions-cell { display: flex; gap: 8px; }
    .actions-cell button {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      transition: all 0.15s;
    }
    .actions-cell button:hover { border-color: var(--primary); color: var(--primary); }
    .actions-cell button.delete:hover { border-color: var(--danger); color: var(--danger); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 12px;
      width: 600px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
    }
    .modal h2 { font-size: 18px; color: var(--primary); margin-bottom: 20px; }
    .modal .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal .form-row.single { grid-template-columns: 1fr; }
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
    .form-field input, .form-field textarea, .form-field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      background: var(--white);
      color: var(--text);
    }
    .form-field textarea { min-height: 80px; resize: vertical; }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

    .msg-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      color: #fff;
      z-index: 300;
      display: none;
    }
    .msg-toast.success { background: var(--success); }
    .msg-toast.error { background: var(--danger); }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 250;
    }
    .loading-overlay.active { display: flex; }
    .loading-overlay span { font-size: 15px; color: var(--text-light); }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-light);
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- Top Navigation -->
<nav class="topnav">
  <div class="brand">江苏<span>君劭</span>律师事务所 · 管理后台</div>
  <div class="topnav-right">
    <span class="username" id="displayUsername"></span>
    <button onclick="logout()">退出登录</button>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
  <h3>内容管理</h3>
  <a href="index.html" class="active"><span class="icon">📊</span> 管理首页</a>
  <a href="lawyers.html"><span class="icon">👨‍⚖️</span> 律师团队</a>
  <a href="practice-areas.html"><span class="icon">⚖️</span> 专业领域</a>
  <a href="insights.html"><span class="icon">📝</span> 研究成果</a>
  <a href="pages.html"><span class="icon">📄</span> 页面内容</a>
</div>

<!-- Main Content -->
<div class="main">
  <h1 class="page-title">管理首页</h1>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="number" id="lawyerCount">-</div><div class="label">律师人数</div></div>
    <div class="stat-card"><div class="number" id="partnerCount">-</div><div class="label">合伙人</div></div>
    <div class="stat-card"><div class="number" id="areaCount">-</div><div class="label">专业领域</div></div>
    <div class="stat-card"><div class="number" id="insightCount">-</div><div class="label">研究成果</div></div>
  </div>

  <!-- Quick Actions -->
  <div class="card" style="margin-bottom:24px;">
    <div style="padding:20px 24px;">
      <h2 style="font-size:15px;margin-bottom:16px;color:var(--text);">快捷操作</h2>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <a href="lawyers.html" class="btn btn-primary">管理律师团队</a>
        <a href="practice-areas.html" class="btn btn-outline">管理专业领域</a>
        <a href="insights.html" class="btn btn-outline">管理研究成果</a>
        <a href="pages.html" class="btn btn-outline">管理页面内容</a>
        <button class="btn btn-danger" id="exportBtn" onclick="exportData()">📤 导出全部数据</button>
      </div>
    </div>
  </div>

  <!-- Recent Lawyers -->
  <div class="card">
    <div class="section-header" style="padding:20px 24px 0;">
      <h2>律师团队（最近添加）</h2>
      <a href="lawyers.html" class="btn btn-outline" style="font-size:12px;">查看全部 →</a>
    </div>
    <div id="recentLawyers">
      <div class="empty-state">加载中...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="msg-toast" id="toast"></div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <span>处理中...</span>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('admin_token');

function checkAuth() {
  if (!token) { window.location.href = '/admin/login.html'; return false; }
  return true;
}

function getHeaders() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'msg-toast ' + type;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function showLoading(show = true) {
  document.getElementById('loadingOverlay').className = show ? 'loading-overlay active' : 'loading-overlay';
}

async function loadDashboard() {
  if (!checkAuth()) return;
  document.getElementById('displayUsername').textContent = localStorage.getItem('admin_username') || '管理员';

  try {
    const [lawyersRes, areasRes, insightsRes] = await Promise.all([
      fetch(API + '/lawyers', { headers: getHeaders() }),
      fetch(API + '/practice-areas', { headers: getHeaders() }),
      fetch(API + '/insights', { headers: getHeaders() })
    ]);

    if (!lawyersRes.ok) { if (lawyersRes.status === 401) { logout(); return; } }

    const lawyers = await lawyersRes.json();
    const areas = await areasRes.json();
    const insights = await insightsRes.json();

    document.getElementById('lawyerCount').textContent = lawyers.length;
    document.getElementById('partnerCount').textContent = lawyers.filter(l => l.role === 'partner').length;
    document.getElementById('areaCount').textContent = areas.length;
    document.getElementById('insightCount').textContent = insights.length;

    // Recent lawyers
    const recent = lawyers.slice(0, 5);
    const container = document.getElementById('recentLawyers');
    if (recent.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无律师数据</div>';
    } else {
      container.innerHTML = '<table><thead><tr><th>姓名</th><th>职务</th><th>角色</th></tr></thead><tbody>' +
        recent.map(l => `<tr><td><strong>${l.name}</strong></td><td>${l.title || '-'}</td><td>${l.role === 'partner' ? '合伙人' : '执业律师'}</td></tr>`).join('') +
        '</tbody></table>';
    }
  } catch (err) {
    showToast('加载数据失败', 'error');
  }
}

async function exportData() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = '导出中...';
  showLoading(true);
  try {
    const res = await fetch(API + '/export', { headers: getHeaders() });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '导出失败', 'error'); return; }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'jsjunshao-export-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('导出成功！');
  } catch (err) {
    showToast('导出失败', 'error');
  } finally {
    showLoading(false);
    btn.disabled = false;
    btn.textContent = '📤 导出全部数据';
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  localStorage.removeItem('admin_username');
  window.location.href = '/admin/login.html';
}

loadDashboard();
</script>
</body>
</html>
