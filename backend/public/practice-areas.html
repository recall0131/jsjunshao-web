<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专业领域管理 - 江苏君劭律师事务所</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #1B3A5C; --secondary: #C9A84C; --bg: #f4f6f9; --white: #fff; --text: #333; --text-light: #666; --border: #e0e4ea; --danger: #e53; --success: #2a9d4a; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topnav { background: var(--primary); color: var(--white); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .topnav .brand { font-size: 16px; font-weight: 700; }
    .topnav .brand span { color: var(--secondary); }
    .topnav-right { display: flex; align-items: center; gap: 16px; }
    .topnav-right button { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: var(--white); padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: inherit; transition: background 0.2s; }
    .sidebar { position: fixed; top: 56px; left: 0; bottom: 0; width: 220px; background: var(--white); border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto; }
    .sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); padding: 0 20px 10px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--text); text-decoration: none; font-size: 14px; transition: all 0.15s; border-left: 3px solid transparent; }
    .sidebar a:hover { background: var(--bg); color: var(--primary); }
    .sidebar a.active { background: #eef3f8; color: var(--primary); border-left-color: var(--primary); font-weight: 500; }
    .sidebar a .icon { font-size: 16px; width: 20px; text-align: center; }
    .main { margin-left: 220px; margin-top: 56px; padding: 28px 32px; min-height: calc(100vh - 56px); }
    .page-title { font-size: 22px; color: var(--primary); margin-bottom: 24px; font-weight: 700; }
    .card { background: var(--white); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-header h2 { font-size: 16px; color: var(--text); }
    .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #153049; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { background: var(--bg); font-weight: 500; color: var(--text-light); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover { background: #fafbfc; }
    .icon-cell { font-size: 20px; }
    .desc-preview { font-size: 12px; color: var(--text-light); max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .actions-cell { display: flex; gap: 8px; }
    .actions-cell button { padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text); font-family: inherit; transition: all 0.15s; }
    .actions-cell button:hover { border-color: var(--primary); color: var(--primary); }
    .actions-cell button.delete:hover { border-color: var(--danger); color: var(--danger); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--white); border-radius: 12px; width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 28px; }
    .modal h2 { font-size: 18px; color: var(--primary); margin-bottom: 20px; }
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
    .form-field input, .form-field textarea, .form-field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; background: var(--white); color: var(--text); }
    .form-field textarea { min-height: 100px; resize: vertical; }
    .form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .msg-toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; color: #fff; z-index: 300; display: none; }
    .msg-toast.success { background: var(--success); }
    .msg-toast.error { background: var(--danger); }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.7); display: none; align-items: center; justify-content: center; z-index: 250; }
    .loading-overlay.active { display: flex; }
    .loading-overlay span { font-size: 15px; color: var(--text-light); }
    .empty-state { text-align: center; padding: 48px; color: var(--text-light); font-size: 14px; }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="brand">江苏<span>君劭</span>律师事务所 · 管理后台</div>
  <div class="topnav-right">
    <span id="displayUsername"></span>
    <button onclick="logout()">退出登录</button>
  </div>
</nav>

<div class="sidebar">
  <h3>内容管理</h3>
  <a href="index.html"><span class="icon">📊</span> 管理首页</a>
  <a href="lawyers.html"><span class="icon">👨‍⚖️</span> 律师团队</a>
  <a href="practice-areas.html" class="active"><span class="icon">⚖️</span> 专业领域</a>
  <a href="insights.html"><span class="icon">📝</span> 研究成果</a>
  <a href="pages.html"><span class="icon">📄</span> 页面内容</a>
</div>

<div class="main">
  <h1 class="page-title">专业领域管理</h1>

  <div class="section-header">
    <h2>专业领域列表</h2>
    <button class="btn btn-primary" onclick="openModal()">+ 新增领域</button>
  </div>

  <div class="card">
    <div id="tableContainer"><div class="empty-state">加载中...</div></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">新增专业领域</h2>
    <form id="areaForm">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-field">
          <label>领域名称 *</label>
          <input type="text" id="fName" required placeholder="如：公司商事">
        </div>
        <div class="form-field">
          <label>图标（emoji）</label>
          <input type="text" id="fIcon" placeholder="如：⚖️">
        </div>
      </div>
      <div class="form-field">
        <label>排序序号</label>
        <input type="number" id="fSortOrder" value="0" min="0">
      </div>
      <div class="form-field">
        <label>领域描述</label>
        <textarea id="fDescription" placeholder="专业领域的详细描述..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>

<div class="msg-toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><span>处理中...</span></div>

<script>
const API = '/api';
let token = localStorage.getItem('admin_token');
let areas = [];

function checkAuth() { if (!token) { window.location.href = '/admin/login.html'; return false; } return true; }
function getHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
function showToast(msg, type = 'success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'msg-toast ' + type; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 3000); }
function showLoading(show) { document.getElementById('loadingOverlay').className = show ? 'loading-overlay active' : 'loading-overlay'; }

async function loadAreas() {
  if (!checkAuth()) return;
  document.getElementById('displayUsername').textContent = localStorage.getItem('admin_username') || '管理员';
  try {
    const res = await fetch(API + '/practice-areas', { headers: getHeaders() });
    if (!res.ok) { if (res.status === 401) { logout(); return; } throw new Error(); }
    areas = await res.json();
    renderTable();
  } catch (err) { document.getElementById('tableContainer').innerHTML = '<div class="empty-state">加载失败</div>'; }
}

function renderTable() {
  const container = document.getElementById('tableContainer');
  if (areas.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无专业领域数据，点击右上角新增</div>';
    return;
  }
  container.innerHTML = '<table><thead><tr><th>图标</th><th>名称</th><th>描述</th><th>排序</th><th>操作</th></tr></thead><tbody>' +
    areas.map(a => `<tr>
      <td class="icon-cell">${a.icon || '⚖️'}</td>
      <td><strong>${a.name}</strong></td>
      <td><div class="desc-preview">${a.description || '-'}</div></td>
      <td>${a.sort_order}</td>
      <td class="actions-cell">
        <button onclick="editArea(${a.id})">编辑</button>
        <button class="delete" onclick="deleteArea(${a.id})">删除</button>
      </td>
    </tr>`).join('') + '</tbody></table>';
}

function openModal(id) {
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('modalTitle').textContent = id ? '编辑专业领域' : '新增专业领域';
  document.getElementById('areaForm').reset();
  document.getElementById('editId').value = id || '';
  if (id) {
    const a = areas.find(a => a.id === id);
    if (a) {
      document.getElementById('fName').value = a.name || '';
      document.getElementById('fIcon').value = a.icon || '';
      document.getElementById('fDescription').value = a.description || '';
      document.getElementById('fSortOrder').value = a.sort_order || 0;
    }
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

function editArea(id) { openModal(id); }

async function deleteArea(id) {
  if (!confirm('确定要删除该专业领域吗？')) return;
  showLoading(true);
  try {
    const res = await fetch(API + '/practice-areas/' + id, { method: 'DELETE', headers: getHeaders() });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '删除失败', 'error'); return; }
    showToast('删除成功');
    await loadAreas();
  } catch (err) { showToast('删除失败', 'error'); } finally { showLoading(false); }
}

document.getElementById('areaForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('fName').value,
    icon: document.getElementById('fIcon').value,
    description: document.getElementById('fDescription').value,
    sort_order: parseInt(document.getElementById('fSortOrder').value) || 0
  };
  showLoading(true);
  try {
    const res = await fetch(API + '/practice-areas' + (id ? '/' + id : ''), {
      method: id ? 'PUT' : 'POST',
      headers: getHeaders(),
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '保存失败', 'error'); return; }
    showToast(id ? '更新成功' : '新增成功');
    closeModal();
    await loadAreas();
  } catch (err) { showToast('保存失败', 'error'); } finally { showLoading(false); }
});

function logout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_username'); window.location.href = '/admin/login.html'; }

loadAreas();
</script>
</body>
</html>
