<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理登录 - 江苏君劭律师事务所</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #1B3A5C 0%, #0d2137 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-box h1 {
      font-size: 22px;
      color: #1B3A5C;
      margin-bottom: 6px;
      text-align: center;
    }
    .login-box p {
      color: #888;
      font-size: 14px;
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1B3A5C;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1B3A5C;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #153049; }
    .btn-login:disabled { background: #999; cursor: not-allowed; }
    .error-msg {
      color: #e53;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .loading { text-align: center; color: #888; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>江苏君劭律师事务所</h1>
    <p>管理后台登录</p>
    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submitBtn">登 录</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="loading" id="loading">登录中...</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      loading.style.display = 'block';
      submitBtn.disabled = true;

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = data.error || '登录失败';
          errorMsg.style.display = 'block';
        } else {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_username', data.username);
          window.location.href = '/admin/index.html';
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
        errorMsg.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
