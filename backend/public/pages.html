<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面内容管理 - 江苏君劭律师事务所</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #1B3A5C; --secondary: #C9A84C; --bg: #f4f6f9; --white: #fff; --text: #333; --text-light: #666; --border: #e0e4ea; --danger: #e53; --success: #2a9d4a; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topnav { background: var(--primary); color: var(--white); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    .topnav .brand { font-size: 16px; font-weight: 700; }
    .topnav .brand span { color: var(--secondary); }
    .topnav-right { display: flex; align-items: center; gap: 16px; }
    .topnav-right button { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: var(--white); padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: inherit; transition: background .2s; }
    .topnav-right button:hover { background: rgba(255,255,255,.25); }
    .sidebar { position: fixed; top: 56px; left: 0; bottom: 0; width: 220px; background: var(--white); border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto; }
    .sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); padding: 0 20px 10px; }
    .sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--text); text-decoration: none; font-size: 14px; transition: all .15s; border-left: 3px solid transparent; }
    .sidebar a:hover { background: var(--bg); color: var(--primary); }
    .sidebar a.active { background: #eef3f8; color: var(--primary); border-left-color: var(--primary); font-weight: 500; }
    .sidebar a .icon { font-size: 16px; width: 20px; text-align: center; }
    .main { margin-left: 220px; margin-top: 56px; padding: 28px 32px; min-height: calc(100vh - 56px); }
    .page-title { font-size: 22px; color: var(--primary); margin-bottom: 20px; font-weight: 700; }
    .card { background: var(--white); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; margin-bottom: 24px; }
    .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-family: inherit; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #153049; }
    .page-tabs { display: flex; gap: 4px; padding: 20px 24px 0; border-bottom: 1px solid var(--border); }
    .page-tab { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-family: inherit; color: var(--text-light); border-bottom: 2px solid transparent; transition: all .15s; }
    .page-tab:hover { color: var(--primary); }
    .page-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
    .page-editor { padding: 24px; }
    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
    .form-field input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; background: var(--white); color: var(--text); }
    .form-field input:focus { outline: none; border-color: var(--primary); }
    /* Rich text editor */
    .editor-toolbar { display: flex; flex-wrap: wrap; gap: 2px; padding: 8px 10px; background: #f8f9fb; border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; }
    .editor-toolbar button { padding: 6px 10px; border: 1px solid transparent; border-radius: 5px; background: none; cursor: pointer; font-size: 14px; color: var(--text); font-family: inherit; transition: all .15s; min-width: 34px; }
    .editor-toolbar button:hover { background: #e9ecef; border-color: #dee2e6; }
    .editor-toolbar button.active { background: #006994; color: #fff; border-color: #006994; }
    .editor-toolbar .sep { width: 1px; background: #dee2e6; margin: 0 4px; }
    .editor-wrapper { border: 1px solid var(--border); border-radius: 0 0 8px 8px; overflow: hidden; }
    .editor-content { min-height: 360px; max-height: 60vh; overflow-y: auto; padding: 16px 20px; font-size: 15px; line-height: 1.8; color: var(--text); outline: none; background: #fff; }
    .editor-content:empty::before { content: '在此输入页面内容...'; color: #bbb; pointer-events: none; }
    .editor-content h1 { font-size: 26px; font-weight: 700; color: var(--primary); margin: 16px 0 10px; }
    .editor-content h2 { font-size: 20px; font-weight: 600; color: var(--primary); margin: 14px 0 8px; }
    .editor-content h3 { font-size: 16px; font-weight: 600; color: var(--text); margin: 12px 0 6px; }
    .editor-content p { margin: 8px 0; }
    .editor-content ul, .editor-content ol { margin: 8px 0; padding-left: 24px; }
    .editor-content li { margin: 4px 0; }
    .editor-content a { color: #006994; text-decoration: underline; }
    .editor-content blockquote { border-left: 4px solid var(--secondary); padding-left: 16px; color: var(--text-light); margin: 12px 0; }
    /* Source view */
    .source-toggle { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .source-toggle label { font-size: 12px; color: var(--text-light); cursor: pointer; }
    .source-toggle input { cursor: pointer; }
    #sourceView { display: none; width: 100%; min-height: 360px; padding: 16px; font-family: 'Courier New', monospace; font-size: 13px; border: none; resize: none; outline: none; line-height: 1.6; background: #1e1e1e; color: #d4d4d4; }
    /* Actions */
    .actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
    .updated-info { font-size: 12px; color: var(--text-light); }
    .preview-btn { background: #fff; border: 1px solid var(--border); color: var(--text); }
    .preview-btn:hover { border-color: var(--primary); color: var(--primary); }
    .preview-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 200; }
    .preview-modal.active { display: flex; }
    .preview-modal-inner { background: #fff; border-radius: 12px; width: 860px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 32px 40px; }
    .preview-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .preview-modal-header h2 { font-size: 18px; color: var(--primary); }
    .preview-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light); }
    .preview-content { font-size: 15px; line-height: 1.8; }
    .preview-content h1 { font-size: 26px; font-weight: 700; color: var(--primary); margin: 16px 0 10px; }
    .preview-content h2 { font-size: 20px; font-weight: 600; color: var(--primary); margin: 14px 0 8px; }
    .preview-content h3 { font-size: 16px; font-weight: 600; margin: 12px 0 6px; }
    .preview-content p { margin: 8px 0; }
    .preview-content ul, .preview-content ol { margin: 8px 0; padding-left: 24px; }
    .preview-content li { margin: 4px 0; }
    .preview-content a { color: #006994; text-decoration: underline; }
    .preview-content blockquote { border-left: 4px solid var(--secondary); padding-left: 16px; color: var(--text-light); margin: 12px 0; }
    .msg-toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 14px; color: #fff; z-index: 300; display: none; }
    .msg-toast.success { background: var(--success); }
    .msg-toast.error { background: var(--danger); }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,.7); display: none; align-items: center; justify-content: center; z-index: 250; }
    .loading-overlay.active { display: flex; }
    .loading-overlay span { font-size: 15px; color: var(--text-light); }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="brand">江苏<span>君劭</span>律师事务所 · 管理后台</div>
  <div class="topnav-right">
    <span id="displayUsername"></span>
    <button onclick="logout()">退出登录</button>
  </div>
</nav>

<div class="sidebar">
  <h3>内容管理</h3>
  <a href="index.html"><span class="icon">📊</span> 管理首页</a>
  <a href="lawyers.html"><span class="icon">👨⚖️</span> 律师团队</a>
  <a href="practice-areas.html"><span class="icon">⚖️</span> 专业领域</a>
  <a href="insights.html"><span class="icon">📝</span> 研究成果</a>
  <a href="pages.html" class="active"><span class="icon">📄</span> 页面内容</a>
</div>

<div class="main">
  <h1 class="page-title">页面内容管理</h1>

  <div class="card">
    <div class="page-tabs" id="pageTabs">
      <button class="page-tab active" data-key="index">首页</button>
      <button class="page-tab" data-key="about">关于我们</button>
      <button class="page-tab" data-key="contact">联系我们</button>
    </div>
    <div class="page-editor">
      <div class="form-field">
        <label>页面标题</label>
        <input type="text" id="fTitle" placeholder="页面标题" style="font-size:15px;">
      </div>
      <label style="font-size:13px;color:var(--text-light);font-weight:500;display:block;margin-bottom:6px;">页面内容</label>
      <div class="editor-toolbar">
        <button onclick="format('bold')" title="加粗" style="font-weight:700">B</button>
        <button onclick="format('italic')" title="斜体" style="font-style:italic">I</button>
        <button onclick="format('underline')" title="下划线" style="text-decoration:underline">U</button>
        <div class="sep"></div>
        <button onclick="format('formatBlock', '<h1>')" title="标题1">H1</button>
        <button onclick="format('formatBlock', '<h2>')" title="标题2">H2</button>
        <button onclick="format('formatBlock', '<h3>')" title="标题3">H3</button>
        <button onclick="format('formatBlock', '<p>')" title="正文">P</button>
        <div class="sep"></div>
        <button onclick="format('insertUnorderedList')" title="无序列表">• List</button>
        <button onclick="format('insertOrderedList')" title="有序列表">1. List</button>
        <div class="sep"></div>
        <button onclick="insertLink()" title="插入链接">🔗</button>
        <button onclick="insertQuote()" title="引用块">❝</button>
        <div class="sep"></div>
        <button onclick="undo()" title="撤销">↩</button>
        <button onclick="redo()" title="重做">↪</button>
        <div class="source-toggle">
          <input type="checkbox" id="sourceToggle" onchange="toggleSource(this.checked)">
          <label for="sourceToggle">显示源码</label>
        </div>
      </div>
      <div class="editor-wrapper">
        <div class="editor-content" id="editor" contenteditable="true" spellcheck="false"></div>
        <textarea id="sourceView" placeholder="HTML源码..."></textarea>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="savePage()">💾 保存页面</button>
        <button class="btn preview-btn" onclick="previewPage()">👁 预览效果</button>
        <span class="updated-info" id="updatedInfo"></span>
      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="preview-modal" id="previewModal">
  <div class="preview-modal-inner">
    <div class="preview-modal-header">
      <h2 id="previewTitle">页面预览</h2>
      <button class="preview-modal-close" onclick="closePreview()">×</button>
    </div>
    <div class="preview-content" id="previewContent"></div>
  </div>
</div>

<div class="msg-toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><span>处理中...</span></div>

<script>
const API = '/api';
let token = localStorage.getItem('admin_token');
let currentKey = 'index';
let pageData = {};
let isSourceMode = false;

function checkAuth() { if (!token) { window.location.href = '/admin/login.html'; return false; } return true; }
function getHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
function showToast(msg, type='success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'msg-toast ' + type; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
function showLoading(show) { document.getElementById('loadingOverlay').className = show ? 'loading-overlay active' : 'loading-overlay'; }

function format(cmd, value) {
  document.execCommand(cmd, false, value || null);
  document.getElementById('editor').focus();
}

function undo() { document.execCommand('undo', false, null); }
function redo() { document.execCommand('redo', false, null); }

function insertLink() {
  const url = prompt('输入链接地址:', 'https://');
  if (url) {
    document.execCommand('createLink', false, url);
    document.getElementById('editor').focus();
  }
}

function insertQuote() {
  document.execCommand('formatBlock', false, '<blockquote>');
  document.getElementById('editor').focus();
}

function toggleSource(show) {
  isSourceMode = show;
  const editor = document.getElementById('editor');
  const source = document.getElementById('sourceView');
  if (show) {
    source.value = editor.innerHTML;
    source.style.display = 'block';
    editor.style.display = 'none';
  } else {
    editor.innerHTML = source.value;
    editor.style.display = 'block';
    source.style.display = 'none';
  }
}

function getContent() {
  if (isSourceMode) return document.getElementById('sourceView').value;
  return document.getElementById('editor').innerHTML;
}

function setContent(html) {
  const editor = document.getElementById('editor');
  const source = document.getElementById('sourceView');
  if (isSourceMode) {
    source.value = html || '';
  } else {
    editor.innerHTML = html || '';
  }
}

async function loadPage(key) {
  currentKey = key;
  showLoading(true);
  try {
    const res = await fetch(API + '/pages/' + key, { headers: getHeaders() });
    if (!res.ok) { if (res.status === 401) { logout(); return; } throw new Error(); }
    pageData = await res.json();
    document.getElementById('fTitle').value = pageData.title || '';
    // Try to parse as JSON first (for contact page), otherwise treat as raw HTML
    let content = pageData.content || '';
    try {
      const parsed = JSON.parse(content);
      content = parsed.content || parsed.text || content;
    } catch(e) {}
    setContent(content);
    document.getElementById('updatedInfo').textContent = pageData.updated_at ? '上次更新: ' + pageData.updated_at : '';
  } catch(err) { showToast('加载页面失败', 'error'); } finally { showLoading(false); }
}

async function savePage() {
  showLoading(true);
  try {
    const title = document.getElementById('fTitle').value;
    const content = getContent();
    const body = { title, content };
    const res = await fetch(API + '/pages/' + currentKey, {
      method: 'PUT',
      headers: getHeaders(),
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '保存失败', 'error'); return; }
    showToast('✅ 页面保存成功！');
    pageData = data;
    document.getElementById('updatedInfo').textContent = '已更新: ' + new Date().toLocaleString('zh-CN');
  } catch(err) { showToast('保存失败', 'error'); } finally { showLoading(false); }
}

function previewPage() {
  const title = document.getElementById('fTitle').value;
  const content = getContent();
  document.getElementById('previewTitle').textContent = title || '预览';
  document.getElementById('previewContent').innerHTML = content;
  document.getElementById('previewModal').classList.add('active');
}

function closePreview() {
  document.getElementById('previewModal').classList.remove('active');
}

function logout() { localStorage.removeItem('admin_token'); localStorage.removeItem('admin_username'); window.location.href = '/admin/login.html'; }

document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
  document.getElementById('displayUsername').textContent = localStorage.getItem('admin_username') || '管理员';
  loadPage('index');
  document.querySelectorAll('.page-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      loadPage(tab.dataset.key);
    });
  });
  // Close preview on ESC
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });
});
</script>
</body>
</html>
