version: '3.8'
services:
  web:
    build: ./backend
    container_name: jsjunshao-web
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/jsjunshao.db
      - STATIC_DIR=/app/public
      - IMAGE_UPLOAD_DIR=/app/public/images/lawyers
      - JWT_SECRET=${JWT_SECRET:-jsjunshao-admin-secret-2026}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
