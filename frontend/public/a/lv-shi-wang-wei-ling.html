    body { font-family: 'Noto Sans SC', -apple-system, sans-serif; background: #f5f6f8; color: #222; line-height: 1.7; }
    .topbar { background: #1B3A5C; color: #fff; padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .topbar .logo { font-size: 16px; font-weight: 700; }

    .topbar a { color: rgba(255,255,255,.8); text-decoration: none; font-size: 13px; }
    .topbar a:hover { color: #fff; }
    .container { max-width: 960px; margin: 40px auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); overflow: hidden; }
    .lawyer-header { display: flex; gap: 36px; padding: 40px; align-items: flex-start; }
    .lawyer-photo { width: 200px; height: 260px; object-fit: cover; border-radius: 10px; flex-shrink: 0; background: #e9ecef; }

    .lawyer-name { font-size: 28px; font-weight: 700; color: #1B3A5C; margin-bottom: 8px; }
    .lawyer-role { display: inline-block; background: #1B3A5C; color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 13px; margin-bottom: 16px; }
    .lawyer-role.associate { background: #6c757d; }
    .lawyer-role.partner { background: #C9A84C; color: #1B3A5C; }
    .lawyer-contact { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    .lawyer-contact a { color: #006994; text-decoration: none; font-size: 14px; }
    .lawyer-contact a:hover { text-decoration: underline; }
    .section { padding: 32px 40px; border-top: 1px solid #f0f0f0; }
    .section h2 { font-size: 16px; color: #1B3A5C; font-weight: 600; margin-bottom: 16px; border-left: 4px solid #C9A84C; padding-left: 12px; }
    .section p { font-size: 15px; color: #444; line-height: 1.9; }
    .section ul { list-style: none; display: flex; flex-wrap: wrap; gap: 10px; }
    .section ul li { background: #f0f4f8; color: #1B3A5C; padding: 6px 16px; border-radius: 6px; font-size: 14px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; margin: 32px 0 0 40px; color: #006994; text-decoration: none; font-size: 14px; }
    .back-btn:hover { text-decoration: underline; }
    footer { text-align: center; padding: 32px; color: #aaa; font-size: 13px; margin-top: 40px; }
    @media (max-width: 640px) {
      .lawyer-header { flex-direction: column; }
      .lawyer-photo { width: 160px; height: 200px; }
    }
